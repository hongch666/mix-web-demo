server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  mode: ${SERVER_MODE:dev}
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: spring
  jackson:
    property-naming-strategy: SNAKE_CASE
  r2dbc:
    url: r2dbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:demo}?sslMode=DISABLED&serverZoneId=Asia/Shanghai
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-acquire-time: 30s
      max-idle-time: 10m
      max-life-time: 30m
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      username: ${REDIS_USERNAME:} # 可选：Redis 用户名
      password: ${REDIS_PASSWORD:} # 可选：Redis 密码
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
      timeout: 3000
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VHOST:test}

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs # OpenAPI 规范 JSON 路径
  swagger-ui:
    path: /swagger-ui.html # Swagger UI 入口路径
    url: /v3/api-docs # Swagger UI 加载的 OpenAPI 规范 URL（避免加载默认 Petstore 示例）
    operations-sorter: alpha # 按字母顺序排序接口
    tags-sorter: alpha # 按字母顺序排序标签
    disable-swagger-default-url: true # 禁用 springdoc 默认 URL 配置

logging:
  file:
    path: ${LOGGING_PATH:../logs/spring}
  level:
    '[org.springframework.r2dbc]': ${R2DBC_LOG_LEVEL:INFO}
jwt:
  secret: ${JWT_SECRET:}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 毫秒数（默认1小时）
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 毫秒数（默认7天）
internal-token:
  secret: ${INTERNAL_TOKEN_SECRET:}
  expiration: ${INTERNAL_TOKEN_EXPIRATION:60000} # 毫秒数（60秒）

user:
  default-password: ${USER_DEFAULT_PASSWORD:}
  reset-password: ${USER_RESET_PASSWORD:}

resilience4j:
  circuitbreaker:
    instances:
      gozero:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      fastapi:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      nestjs:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      gozero:
        timeoutDuration: 3s
      fastapi:
        timeoutDuration: 30s
      nestjs:
        timeoutDuration: 3s
