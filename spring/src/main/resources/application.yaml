server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  mode: ${SERVER_MODE:dev}
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: spring
  jackson:
    property-naming-strategy: SNAKE_CASE
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 3000
          fastapi:
            connectTimeout: 5000
            readTimeout: 30000
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:demo}?useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      leak-detection-threshold: 60000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      username: ${REDIS_USERNAME:} # 可选：Redis 用户名
      password: ${REDIS_PASSWORD:} # 可选：Redis 密码
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
      timeout: 3000
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VHOST:test}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml # 指定 Mapper XML 文件位置
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl # SQL日志走SLF4J，级别由logging.level控制
  global-config:
    db-config:
      id-type: auto # 主键策略
      logic-delete-field: deleted # 逻辑删除字段

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs # OpenAPI 规范 JSON 路径
  swagger-ui:
    path: /swagger-ui.html # Swagger UI 入口路径
    url: /v3/api-docs # Swagger UI 加载的 OpenAPI 规范 URL（避免加载默认 Petstore 示例）
    operations-sorter: alpha # 按字母顺序排序接口
    tags-sorter: alpha # 按字母顺序排序标签
    disable-swagger-default-url: true # 禁用 springdoc 默认 URL 配置

logging:
  file:
    path: ${LOGGING_PATH:../logs/spring}
  level:
    '[com.hcsy.spring.api.mapper]': ${MYBATIS_LOG_LEVEL:DEBUG} # DEBUG打印SQL（生产环境设为INFO关闭）
jwt:
  secret: ${JWT_SECRET:}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 毫秒数（默认1小时）
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 毫秒数（默认7天）
internal-token:
  secret: ${INTERNAL_TOKEN_SECRET:}
  expiration: ${INTERNAL_TOKEN_EXPIRATION:60000} # 毫秒数（60秒）

user:
  default-password: ${USER_DEFAULT_PASSWORD:}
  reset-password: ${USER_RESET_PASSWORD:}

resilience4j:
  circuitbreaker:
    instances:
      gozero:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      fastapi:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      nestjs:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 3s
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      gozero:
        timeoutDuration: 3s
      fastapi:
        timeoutDuration: 30s
      nestjs:
        timeoutDuration: 3s
