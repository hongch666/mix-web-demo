server:
  mode: ${SERVER_MODE:dev}
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      username: ${REDIS_USERNAME:} # 可选：Redis 用户名（Redis 6.0+）
      password: ${REDIS_PASSWORD:} # 可选：Redis 密码
      timeout: ${REDIS_TIMEOUT:3000}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP_NAME:DEFAULT_GROUP}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP_NAME:DEFAULT_GROUP}
    gateway:
      # 全局WebSocket支持
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # 1. 先排除特殊路径
        - id: exclude-list
          uri: no://op
          # 拦截的有:Spring查询用户列表,GoZero手动同步接口,FastAPI手动同步接口,NestJS手动执行定时任务,Spring手动执行定时任务,文章日志创建,导出excel,创建AI历史记录
          predicates:
            - Path=/articles/list,/api_gozero/syncer,/api_fastapi/task/**,/api_nestjs/execute/**,/api_spring/execute/**,/logs,/ai_history,/upload
          filters:
            - SetStatus=204

        # 2. 正常路由
        - id: spring
          uri: lb://spring
          predicates:
            - Path=/api_spring/**,/users/**,/articles/**,/category/**,/comments/**,/collects/**,/likes/**,/focus/**

        - id: gozero-ws
          uri: ws://${GOZERO_HOST:localhost}:${GOZERO_PORT:8082}
          predicates:
            - Path=/ws/**
          metadata:
            # WebSocket 相关配置
            connect-timeout: 60000
            response-timeout: 60000

        - id: gozero-sse
          uri: http://${GOZERO_HOST:localhost}:${GOZERO_PORT:8082}
          predicates:
            - Path=/sse/**
          metadata:
            # SSE 相关配置（需要持续连接，响应超时设为-1）
            response-timeout: -1
            connect-timeout: 60000

        - id: gozero
          uri: lb://gozero
          predicates:
            - Path=/api_gozero/**,/search/**,/user-chat/**,/static/**

        - id: nestjs
          uri: lb://nestjs
          predicates:
            - Path=/api_nestjs/**,/article-logs/**,/api-logs/**,/download/**,/upload/**

        - id: fastapi
          uri: lb://fastapi
          predicates:
            - Path=/api_fastapi/**,/analyze/**,/generate/**,/chat/**,/ai_history/**
auth:
  exclude-paths:
    - /users/login
    - /users/register
    - /users/email/send
    - /users/email-login
    - /upload/**

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

# 限流配置
rate-limit:
  # 是否启用限流
  enabled: ${RATE_LIMIT_ENABLED:true}

  # 通用限流配置
  common:
    # 令牌桶容量（最多可以突发的请求数）
    capacity: ${RATE_LIMIT_COMMON_CAPACITY:10}
    # 令牌填充速率（每秒填充多少个令牌）
    refill-rate: ${RATE_LIMIT_COMMON_REFILL_RATE:1}
    # 是否启用
    enabled: true

  # 限流路径配置
  paths:
    # 文件上传限流配置（严格的限流）
    "/upload/**":
      # 限流超出时的响应消息
      message: "上传请求过于频繁，请稍后再试"

    # 发送验证码接口限流配置
    "/api_spring/users/email/send":
      message: "发送验证码请求过于频繁，请稍后再试"

    # 用户登录接口限流配置
    "/users/login":
      message: "登录请求过于频繁，请稍后再试"

    # 用户注册接口限流配置
    "/users/register":
      message: "注册请求过于频繁，请稍后再试"

    # 用户邮箱登录接口限流配置
    "/users/email-login":
      message: "邮箱登录请求过于频繁，请稍后再试"
