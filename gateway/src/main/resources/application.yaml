server:
  mode: ${SERVER_MODE:dev}
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      username: ${REDIS_USERNAME:} # 可选：Redis 用户名（Redis 6.0+）
      password: ${REDIS_PASSWORD:} # 可选：Redis 密码
      timeout: ${REDIS_TIMEOUT:3000}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP_NAME:DEFAULT_GROUP}
      discovery:
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP_NAME:DEFAULT_GROUP}
    gateway:
      # 全局WebSocket支持
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # 1. 正常路由
        - id: spring
          uri: lb://spring
          predicates:
            - Path=/test/spring,/users/**,/articles/**,/category/**,/comments/**,/collects/**,/likes/**,/focus/**,/task/clean

        - id: gozero-ws
          uri: ws://${GOZERO_HOST:localhost}:${GOZERO_PORT:8082}
          predicates:
            - Path=/ws/**
          metadata:
            # WebSocket 相关配置
            connect-timeout: 60000
            response-timeout: 60000

        - id: gozero-sse
          uri: http://${GOZERO_HOST:localhost}:${GOZERO_PORT:8082}
          predicates:
            - Path=/sse/**
          metadata:
            # SSE 相关配置（需要持续连接，响应超时设为-1）
            response-timeout: -1
            connect-timeout: 60000

        - id: gozero
          uri: lb://gozero
          predicates:
            - Path=/test/gozero,/search/**,/user-chat/**,/task/syncer

        - id: nestjs
          uri: lb://nestjs
          predicates:
            - Path=/test/nestjs,/article-logs/**,/api-logs/**,/download/**,/upload/**,/github/**,/email/**,/task/apilog,/task/articlelog

        - id: fastapi
          uri: lb://fastapi
          predicates:
            - Path=/test/fastapi,/analyze/**,/generate/**,/chat/**,/ai_history/**,/task/update-analyze-caches,/task/vector,/task/init-hash-cache,/task/clear-analyze-caches,/task/sync-neo4j

        # ---- Swagger 文档代理路由 ----
        - id: swagger-spring
          uri: lb://spring
          predicates:
            - Path=/swagger/spring.json
          filters:
            - SetPath=/v3/api-docs
            - name: ModifyResponseBody
              args:
                inClass: java.lang.String
                outClass: java.lang.String
                rewriteFunction: "#{@swaggerRewriteFunction}"

        - id: swagger-gozero
          uri: lb://gozero
          predicates:
            - Path=/swagger/gozero.json
          filters:
            - SetPath=/swagger/doc.json

        - id: swagger-nestjs
          uri: lb://nestjs
          predicates:
            - Path=/swagger/nestjs.json
          filters:
            - SetPath=/api-docs-json

        - id: swagger-fastapi
          uri: lb://fastapi
          predicates:
            - Path=/swagger/fastapi.json
          filters:
            - SetPath=/openapi.json
auth:
  exclude-paths:
    - /swagger-ui/**
    - /swagger/spring.json
    - /swagger/gozero.json
    - /swagger/nestjs.json
    - /swagger/fastapi.json
    - /users/login
    - /users/register
    - /users/email/send
    - /users/email-login
    - /users/captcha
    - /users/token/refresh
    - /upload/**
    - /github/authorize
    - /github/callback
    - /users/github/token
  block-paths:
    - /articles/list
    - /task/**
    - /logs
    - /ai_history
    - /upload
    - /users/github/token-ticket
    - /email/send-code

jwt:
  secret: ${JWT_SECRET:}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# 限流配置
rate-limit:
  # 是否启用限流
  enabled: ${RATE_LIMIT_ENABLED:true}

  # 通用限流配置
  common:
    # 令牌桶容量（最多可以突发的请求数）
    capacity: ${RATE_LIMIT_COMMON_CAPACITY:10}
    # 令牌填充速率（每秒填充多少个令牌）
    refill-rate: ${RATE_LIMIT_COMMON_REFILL_RATE:1}
    # 是否启用
    enabled: true

  # 限流路径配置
  paths:
    # 文件上传限流配置（严格的限流）
    "/upload/**":
      # 限流超出时的响应消息
      message: "上传请求过于频繁，请稍后再试"

    # 发送验证码接口限流配置
    "/api_spring/users/email/send":
      message: "发送验证码请求过于频繁，请稍后再试"

    # 用户登录接口限流配置
    "/users/login":
      message: "登录请求过于频繁，请稍后再试"

    # Token 刷新接口限流配置（白名单接口，需要额外保护）
    "/users/token/refresh":
      message: "Token 刷新请求过于频繁，请稍后再试"

    # 用户注册接口限流配置
    "/users/register":
      message: "注册请求过于频繁，请稍后再试"

    # 用户邮箱登录接口限流配置
    "/users/email-login":
      message: "邮箱登录请求过于频繁，请稍后再试"

    # 验证码接口限流配置
    "/users/captcha":
      message: "验证码请求过于频繁，请稍后再试"

    # GitHub 获取授权地址接口限流配置
    "/github/authorize":
      message: "GitHub 获取授权地址请求过于频繁，请稍后再试"

    # GitHub 回调接口限流配置
    "/github/callback":
      message: "GitHub 回调请求过于频繁，请稍后再试"

    # GitHub 登录票据生成接口限流配置
    "/users/github/token-ticket":
      message: "GitHub 登录票据生成请求过于频繁，请稍后再试"
