version: "3.8"

services:
  gateway:
    image: mix-gateway:latest
    container_name: mix-gateway
    env_file:
      - ./gateway/.env.docker
    ports:
      - "8080:8080"
    environment:
      NACOS_SERVER: nacos:8848
      REDIS_HOST: redis
      GOZERO_HOST: gozero
    networks:
      - hcsy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  spring:
    image: mix-spring:latest
    container_name: mix-spring
    env_file:
      - ./spring/.env.docker
    ports:
      - "8081:8081"
    environment:
      NACOS_SERVER: nacos:8848
      DB_HOST: mysql
      REDIS_HOST: redis
      RABBITMQ_HOST: mq
    volumes:
      - ./spring/application.yaml:/app/application.yaml:ro
      - ./logs/spring:/app/logs/spring
      - ./static/pic:/app/static/pic
      - ./static/excel:/app/static/excel
      - ./static/upload:/app/static/upload
    networks:
      - hcsy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/test/spring"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  gozero:
    image: mix-gozero:latest
    container_name: mix-gozero
    env_file:
      - ./gozero/app/.env.docker
    ports:
      - "8082:8082"
    environment:
      SERVER_IP: 0.0.0.0
      NACOS_IP: nacos
      DB_MYSQL_HOST: mysql
      DB_ES_HOST: es
      DB_MONGODB_HOST: mongodb
      RABBITMQ_HOST: mq
      LOGS_PATH: /app/logs/gozero
    volumes:
      - ./gozero/app/etc:/app/etc:ro
      - ./logs/gozero:/app/logs/gozero
      - ./static/pic:/app/static/pic
      - ./static/excel:/app/static/excel
      - ./static/upload:/app/static/upload
    networks:
      - hcsy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/test/gozero"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nestjs:
    image: mix-nestjs:latest
    container_name: mix-nestjs
    env_file:
      - ./nestjs/.env.docker
    ports:
      - "8083:8083"
    environment:
      SERVER_IP: 0.0.0.0
      NACOS_SERVER: nacos
      NACOS_PORT: 8848
      DB_HOST: mysql
      DB_MONGODB_HOST: mongodb
      RABBITMQ_HOST: mq
      LOGS_PATH: /app/logs/nestjs
    volumes:
      - ./nestjs/src/config/application.yaml:/app/dist/config/application.yaml:ro
      - ./logs/nestjs:/app/logs/nestjs
      - ./static/pic:/app/static/pic
      - ./static/excel:/app/static/excel
      - ./static/upload:/app/static/upload
    networks:
      - hcsy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/test/nestjs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  fastapi:
    image: mix-fastapi:latest
    container_name: mix-fastapi
    env_file:
      - ./fastapi/.env.docker
    ports:
      - "8084:8084"
    environment:
      SERVER_IP: 0.0.0.0
      NACOS_SERVER: nacos:8848
      RABBITMQ_HOST: mq
      DB_MYSQL_HOST: mysql
      DB_POSTGRES_HOST: pgvector-db
      DB_MONGODB_HOST: mongodb
      DB_REDIS_HOST: redis
      DB_CLICKHOUSE_HOST: clickhouse
      LOGS_PATH: /app/logs/fastapi
    volumes:
      - ./fastapi/application.yaml:/app/application.yaml:ro
      - ./logs/fastapi:/app/logs/fastapi
      - ./static/pic:/app/static/pic
      - ./static/excel:/app/static/excel
      - ./static/upload:/app/static/upload
    networks:
      - hcsy
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/test/fastapi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  hcsy:
    external: true
